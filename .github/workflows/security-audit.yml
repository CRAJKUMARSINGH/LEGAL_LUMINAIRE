name: security-audit

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "30 2 * * 1" # Mondays 02:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node_audit:
    name: Node dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: Audit (high+)
        run: pnpm audit --audit-level high

  python_audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit backend requirements
        run: pip-audit -r artifacts/legal-luminaire/backend/requirements.txt

      - name: Audit streamlit requirements
        run: pip-audit -r requirements-streamlit.txt

