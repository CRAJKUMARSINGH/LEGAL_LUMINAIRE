kind = "web"
previewPath = "/"
title = "Legal Luminaire - Advocate Research Platform"
version = "1.0.0"
id = "artifacts/legal-luminaire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21261

[services.development]
run = "pnpm --filter @workspace/legal-luminaire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legal-luminaire", "run", "build" ]
publicDir = "artifacts/legal-luminaire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21261"
BASE_PATH = "/"
